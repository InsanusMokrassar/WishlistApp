<!-- @dsCard group="Colors" viewport="700x140" name="Brand & semantic" subtitle="Primary blue accent + Bootstrap semantic states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--wl-font-sans); }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--wl-radius); overflow: hidden; border: 1px solid var(--wl-border); }
  .chip { height: 56px; }
  .meta { padding: 6px 8px; }
  .name { font-size: 12px; font-weight: 600; color: var(--wl-text-body); }
  .hex { font-size: 11px; color: var(--wl-text-muted); font-family: var(--wl-font-mono); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--wl-primary)"></div><div class="meta"><div class="name">Primary</div><div class="hex">#0d6efd</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-secondary)"></div><div class="meta"><div class="name">Secondary</div><div class="hex">#6c757d</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-success)"></div><div class="meta"><div class="name">Success</div><div class="hex">#198754</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-danger)"></div><div class="meta"><div class="name">Danger</div><div class="hex">#dc3545</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-warning)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#ffc107</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-info)"></div><div class="meta"><div class="name">Info</div><div class="hex">#0dcaf0</div></div></div>
</div>
</body>
</html>
