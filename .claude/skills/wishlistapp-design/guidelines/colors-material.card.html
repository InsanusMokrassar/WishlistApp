<!-- @dsCard group="Colors" viewport="700x160" name="Material 3 scheme (Desktop & Android)" subtitle="Default M3 baseline light scheme — purple primary, tonal containers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--m3-font); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 12px; padding: 14px; min-height: 54px; display: flex; align-items: flex-end; font-size: 12px; font-weight: 500; }
  .row2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
  .chip { height: 40px; border-radius: 8px; border: 1px solid var(--m3-outline-variant); display: flex; align-items: center; padding: 0 10px; font-size: 11px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--m3-primary); color:var(--m3-on-primary)">Primary</div>
  <div class="sw" style="background:var(--m3-primary-container); color:var(--m3-on-primary-container)">Primary container</div>
  <div class="sw" style="background:var(--m3-secondary-container); color:var(--m3-on-secondary-container)">Secondary container</div>
  <div class="sw" style="background:var(--m3-tertiary-container); color:var(--m3-on-tertiary-container)">Tertiary container</div>
</div>
<div class="row2">
  <div class="chip" style="background:var(--m3-surface)">surface #FFFBFE</div>
  <div class="chip" style="background:var(--m3-surface-variant)">surfaceVariant</div>
  <div class="chip" style="background:var(--m3-error-container); color:var(--m3-on-error-container)">errorContainer</div>
  <div class="chip" style="background:var(--m3-surface); color:var(--m3-on-surface-variant)">onSurfaceVariant</div>
</div>
</body>
</html>
