<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Bootstrap spacers — 1rem base, the app's py-3 / mb-3 / gap-2 rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--wl-font-sans); }
  .row { display: flex; align-items: flex-end; gap: 20px; }
  .item { text-align: center; }
  .bar { background: var(--wl-primary); border-radius: 2px; width: 28px; }
  .lbl { font-size: 11px; color: var(--wl-text-body); font-weight: 600; margin-top: 6px; }
  .val { font-size: 10px; color: var(--wl-text-muted); font-family: var(--wl-font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:var(--wl-space-1)"></div><div class="lbl">1</div><div class="val">4px</div></div>
  <div class="item"><div class="bar" style="height:var(--wl-space-2)"></div><div class="lbl">2</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="height:var(--wl-space-3)"></div><div class="lbl">3</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="height:var(--wl-space-4)"></div><div class="lbl">4</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:var(--wl-space-5)"></div><div class="lbl">5</div><div class="val">48px</div></div>
</div>
</body>
</html>
