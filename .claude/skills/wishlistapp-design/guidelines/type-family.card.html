<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--wl-font-sans); color: var(--wl-text-body); }
  .big { font-size: 40px; font-weight: 500; letter-spacing: -0.01em; }
  .stack { font-family: var(--wl-font-mono); font-size: 11px; color: var(--wl-text-muted); margin-top: 10px; }
  .mono { font-family: var(--wl-font-mono); font-size: 18px; margin-top: 8px; }
</style>
</head>
<body>
<div class="big">Wishlists for everyone you love</div>
<div class="mono">system-ui · monospace 0123456789</div>
<div class="stack">system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif</div>
</body>
</html>
