<!-- @dsCard group="Colors" viewport="700x130" name="Subtle / emphasis pairs" subtitle="Tinted backgrounds + emphasis text — badges & alerts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--wl-font-sans); }
  .pairs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pair { border-radius: var(--wl-radius); padding: 14px; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="pairs">
  <div class="pair" style="background:var(--wl-primary-bg-subtle); color:var(--wl-primary-text-emphasis)">Primary subtle</div>
  <div class="pair" style="background:var(--wl-secondary-bg-subtle); color:var(--wl-secondary-text-emphasis)">Priority pill</div>
  <div class="pair" style="background:var(--wl-success-bg-subtle); color:var(--wl-success-text-emphasis)">Success alert</div>
  <div class="pair" style="background:var(--wl-danger-bg-subtle); color:var(--wl-danger-text-emphasis)">Danger alert</div>
</div>
</body>
</html>
