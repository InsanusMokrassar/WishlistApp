<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--wl-font-sans); }
  .row { display: flex; gap: 28px; align-items: center; }
  img { width: 110px; height: 110px; border-radius: var(--wl-radius); border: 1px solid var(--wl-border); }
  .item { text-align: center; }
  .lbl { font-size: 12px; color: var(--wl-text-body); font-weight: 600; margin-top: 8px; }
  .sub { font-size: 11px; color: var(--wl-text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><img src="../assets/giftbox.svg" alt="Gift box" /><div class="lbl">Gift box</div><div class="sub">item, no image</div></div>
  <div class="item"><img src="../assets/stacked-items.svg" alt="Stacked items" /><div class="lbl">Stacked cards</div><div class="sub">wishlist</div></div>
  <div class="item"><img src="../assets/user-silhouette.svg" alt="User silhouette" style="border-radius:var(--wl-radius-circle)" /><div class="lbl">Silhouette</div><div class="sub">user avatar</div></div>
</div>
</body>
</html>
