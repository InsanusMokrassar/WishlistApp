<!-- @dsCard group="Colors" viewport="700x140" name="Neutral ramp" subtitle="Gray scale — surfaces, borders, body & muted text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--wl-font-sans); }
  .swatches { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .sw { text-align: center; }
  .chip { height: 56px; border-radius: var(--wl-radius); border: 1px solid var(--wl-border); }
  .name { font-size: 10px; font-weight: 600; color: var(--wl-text-body); margin-top: 4px; }
  .hex { font-size: 9px; color: var(--wl-text-muted); font-family: var(--wl-font-mono); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--wl-gray-100)"></div><div class="name">100</div><div class="hex">f8f9fa</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-200)"></div><div class="name">200</div><div class="hex">e9ecef</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-300)"></div><div class="name">300</div><div class="hex">dee2e6</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-400)"></div><div class="name">400</div><div class="hex">ced4da</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-500)"></div><div class="name">500</div><div class="hex">adb5bd</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-600)"></div><div class="name">600</div><div class="hex">6c757d</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-700)"></div><div class="name">700</div><div class="hex">495057</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-800)"></div><div class="name">800</div><div class="hex">343a40</div></div>
  <div class="sw"><div class="chip" style="background:var(--wl-gray-900)"></div><div class="name">900</div><div class="hex">212529</div></div>
</div>
</body>
</html>
