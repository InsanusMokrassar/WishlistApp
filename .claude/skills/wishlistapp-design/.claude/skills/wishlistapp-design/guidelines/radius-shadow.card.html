<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & shadow" subtitle="Default 0.375rem radius, pill badges, circle avatars; subtle elevation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--wl-font-sans); }
  .row { display: flex; gap: 22px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--wl-surface-card); border: 1px solid var(--wl-border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--wl-text-muted); }
  .lbl { font-size: 11px; color: var(--wl-text-body); font-weight: 600; text-align: center; margin-top: 6px; }
  .item { text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--wl-radius-sm)">sm</div><div class="lbl">0.25rem</div></div>
  <div class="item"><div class="box" style="border-radius:var(--wl-radius)">base</div><div class="lbl">0.375rem</div></div>
  <div class="item"><div class="box" style="border-radius:var(--wl-radius-lg)">lg</div><div class="lbl">0.5rem</div></div>
  <div class="item"><div class="box" style="border-radius:var(--wl-radius-pill); width:64px; height:64px">pill</div><div class="lbl">avatar/pill</div></div>
  <div class="item"><div class="box" style="border:none; box-shadow:var(--wl-shadow-sm); border-radius:var(--wl-radius)">sm</div><div class="lbl">shadow-sm</div></div>
  <div class="item"><div class="box" style="border:none; box-shadow:var(--wl-shadow); border-radius:var(--wl-radius)">md</div><div class="lbl">shadow</div></div>
</div>
</body>
</html>
