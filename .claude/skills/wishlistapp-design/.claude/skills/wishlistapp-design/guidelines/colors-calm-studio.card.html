<!-- @dsCard group="Colors" viewport="700x150" name="Calm Studio palette (redesign)" subtitle="Target web spec — one indigo accent + cool near-monochrome ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: "Manrope", system-ui, sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: 10px; overflow: hidden; border: 1px solid var(--cs-line); }
  .chip { height: 50px; }
  .meta { padding: 6px 8px; }
  .name { font-size: 11px; font-weight: 700; color: var(--cs-ink); }
  .hex { font-size: 10px; color: var(--cs-muted); font-family: ui-monospace, monospace; }
  .row2 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--cs-accent)"></div><div class="meta"><div class="name">accent</div><div class="hex">#5B5BD6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-accent-soft)"></div><div class="meta"><div class="name">accent-soft</div><div class="hex">derived</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-ok)"></div><div class="meta"><div class="name">ok / reserved</div><div class="hex">#2F8F5B</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-pri-med)"></div><div class="meta"><div class="name">pri-med</div><div class="hex">#9A9AB0</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-danger)"></div><div class="meta"><div class="name">danger</div><div class="hex">#B42318</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-ink)"></div><div class="meta"><div class="name">ink</div><div class="hex">#18181B</div></div></div>
</div>
<div class="row2">
  <div class="sw"><div class="chip" style="background:var(--cs-bg)"></div><div class="meta"><div class="name">bg</div><div class="hex">#FAFAFB</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-surface-2)"></div><div class="meta"><div class="name">surface-2</div><div class="hex">#F4F4F6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-line)"></div><div class="meta"><div class="name">line</div><div class="hex">#ECECEF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-muted)"></div><div class="meta"><div class="name">muted</div><div class="hex">#71717A</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-ink-2)"></div><div class="meta"><div class="name">ink-2</div><div class="hex">#3F3F46</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cs-faint)"></div><div class="meta"><div class="name">faint</div><div class="hex">#A1A1AA</div></div></div>
</div>
</body>
</html>
