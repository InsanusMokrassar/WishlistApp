<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--cs-font); color: var(--cs-ink); }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 9px; }
  .tag { font-family: ui-monospace, monospace; font-size: 11px; color: var(--cs-faint); width: 130px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="line"><span class="tag">h1 · 26 / 800</span><span style="font-size:var(--cs-h1); font-weight:800; letter-spacing:-.02em">My Lists</span></div>
<div class="line"><span class="tag">detail · 28 / 800</span><span style="font-size:var(--cs-h-detail); font-weight:800; letter-spacing:-.02em">Mechanical keyboard</span></div>
<div class="line"><span class="tag">card title · 14.5 / 700</span><span style="font-size:var(--cs-card-title); font-weight:700; letter-spacing:-.01em">Noise-cancelling headphones</span></div>
<div class="line"><span class="tag">body · 14</span><span style="font-size:var(--cs-body)">Brown switches, TKL layout, wireless.</span></div>
<div class="line"><span class="tag">small · 12.5</span><span style="font-size:var(--cs-small); color:var(--cs-muted)">12 items · public · 3 reserved</span></div>
<div class="line"><span class="tag">label · 11 / .08em</span><span style="font-size:var(--cs-label); font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--cs-faint)">Approximate price</span></div>
</body>
</html>
