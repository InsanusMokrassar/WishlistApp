<!-- @dsCard group="Type" viewport="700x250" name="Heading scale" subtitle="Bootstrap headings — weight 500, line-height 1.2" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--wl-font-sans); color: var(--wl-text-body); }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .tag { font-family: var(--wl-font-mono); font-size: 11px; color: var(--wl-text-muted); width: 64px; flex-shrink: 0; }
  h1,h2,h3,h4,h5,h6 { margin: 0; font-weight: 500; line-height: 1.2; }
  h1{font-size:var(--wl-h1)} h2{font-size:var(--wl-h2)} h3{font-size:var(--wl-h3)}
  h4{font-size:var(--wl-h4)} h5{font-size:var(--wl-h5)} h6{font-size:var(--wl-h6)}
</style>
</head>
<body>
<div class="line"><span class="tag">h1 · 40</span><h1>Wishlists</h1></div>
<div class="line"><span class="tag">h2 · 32</span><h2>Wishlists</h2></div>
<div class="line"><span class="tag">h3 · 28</span><h3>Screen title</h3></div>
<div class="line"><span class="tag">h4 · 24</span><h4>Section</h4></div>
<div class="line"><span class="tag">h5 · 20</span><h5>Card title</h5></div>
<div class="line"><span class="tag">h6 · 16</span><h6>Card subtitle / field label</h6></div>
</body>
</html>
