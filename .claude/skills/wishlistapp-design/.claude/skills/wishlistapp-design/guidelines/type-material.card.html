<!-- @dsCard group="Type" viewport="700x210" name="Material 3 type scale (Desktop & Android)" subtitle="Roboto — title / body / label roles used by the Compose clients" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="../styles.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--m3-font); color: var(--m3-on-surface); }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; }
  .tag { font-family: var(--wl-font-mono); font-size: 11px; color: var(--m3-on-surface-variant); width: 120px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="line"><span class="tag">titleLarge · 22</span><span style="font-size:var(--m3-title-large)">Top-bar title</span></div>
<div class="line"><span class="tag">titleMedium · 16/500</span><span style="font-size:var(--m3-title-medium); font-weight:500">Card title</span></div>
<div class="line"><span class="tag">bodyLarge · 16</span><span style="font-size:var(--m3-body-large)">List row primary text</span></div>
<div class="line"><span class="tag">bodyMedium · 14</span><span style="font-size:var(--m3-body-medium)">Card description body</span></div>
<div class="line"><span class="tag">bodySmall · 12</span><span style="font-size:var(--m3-body-small); color:var(--m3-on-surface-variant)">Subtitle · price · helper</span></div>
<div class="line"><span class="tag">labelLarge · 14/500</span><span style="font-size:var(--m3-label-large); font-weight:500; color:var(--m3-primary)">BUTTON LABEL</span></div>
</body>
</html>
