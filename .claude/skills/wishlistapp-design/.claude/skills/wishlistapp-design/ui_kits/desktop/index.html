<!-- @dsCard group="Desktop client" viewport="1040x720" name="WishlistApp — Desktop (Compose, Material 3)" subtitle="Compose for Desktop client — same Material 3 surface, wider layout" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WishlistApp — Desktop</title>
<link href="../../styles.css" rel="stylesheet" />
<link href="../material/m3.css" rel="stylesheet" />
<style>
  body { margin: 0; background: #d9dce0; display: flex; justify-content: center; padding: 24px 12px; box-sizing: border-box; font-family: var(--m3-font); }
  /* Plain desktop window chrome — the Compose for Desktop app has no sidebar. */
  .win { width: 1000px; max-width: 100%; height: 660px; background: var(--m3-surface); border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.30); display: flex; flex-direction: column; }
  .win__bar { height: 40px; flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 0 14px; background: #ededf0; border-bottom: 1px solid #d5d5da; }
  .win__dot { width: 12px; height: 12px; border-radius: 50%; }
  .win__title { flex: 1; text-align: center; font-size: 13px; color: #5f5f66; margin-right: 52px; }
  .win__body { flex: 1; min-height: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../web/data.js"></script>
<script type="text/babel" src="../material/material-app.jsx"></script>
<script type="text/babel">
  function Kit() {
    return (
      <div className="win">
        <div className="win__bar">
          <span className="win__dot" style={{ background: "#ff5f57" }} />
          <span className="win__dot" style={{ background: "#febc2e" }} />
          <span className="win__dot" style={{ background: "#28c840" }} />
          <span className="win__title">WishlistApp</span>
        </div>
        <div className="win__body"><window.MaterialApp /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Kit />);
</script>
</body>
</html>
