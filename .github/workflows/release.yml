name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    name: Linux artifacts (apk, deb, rpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install rpm tooling
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot binutils

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :wishlist.client.android:assembleRelease

      - name: Build Linux desktop packages (deb, rpm)
        run: ./gradlew :wishlist.client:packageDeb :wishlist.client:packageRpm

      - name: Generate release notes
        run: |
          chmod +x ./changelog_info_retriever
          ./changelog_info_retriever 0.1.0 CHANGELOG.md > release_body.md
          cat release_body.md

      - name: Create release and upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            client/android/build/outputs/apk/release/*.apk
            client/build/compose/binaries/main/deb/*.deb
            client/build/compose/binaries/main/rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows artifacts (msi, exe)
    runs-on: windows-latest
    needs: linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Windows desktop packages (msi, exe)
        shell: bash
        run: ./gradlew :wishlist.client:packageMsi :wishlist.client:packageExe

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/build/compose/binaries/main/msi/*.msi
            client/build/compose/binaries/main/exe/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
